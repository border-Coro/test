<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイマー</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #16213e;
      border-radius: 24px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      width: 360px;
    }

    h1 {
      color: #a8b2d8;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* SVG progress ring */
    .ring-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 32px;
    }

    svg {
      transform: rotate(-90deg);
    }

    .track {
      fill: none;
      stroke: #1e293b;
      stroke-width: 6;
    }

    .progress {
      fill: none;
      stroke: #6366f1;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s linear, stroke 0.3s;
    }

    .progress.urgent {
      stroke: #ef4444;
    }

    .time-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: 200;
      color: #e2e8f0;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* Input row */
    .inputs {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      margin-bottom: 28px;
    }

    .inputs input {
      width: 56px;
      padding: 8px 4px;
      font-size: 22px;
      text-align: center;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      outline: none;
      font-variant-numeric: tabular-nums;
      transition: border-color 0.15s;
    }

    .inputs input:focus {
      border-color: #6366f1;
    }

    .inputs input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .inputs .sep {
      color: #64748b;
      font-size: 22px;
      font-weight: 300;
      padding-bottom: 2px;
    }

    .inputs label {
      color: #64748b;
      font-size: 11px;
      display: block;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* Buttons */
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    button {
      padding: 13px 32px;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }

    button:active {
      transform: scale(0.96);
    }

    #mainBtn {
      background: #6366f1;
      color: #fff;
      min-width: 110px;
    }

    #mainBtn:hover {
      background: #4f46e5;
    }

    #mainBtn.pause {
      background: #f59e0b;
    }

    #mainBtn.pause:hover {
      background: #d97706;
    }

    #resetBtn {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
    }

    #resetBtn:hover {
      background: #273549;
      color: #cbd5e1;
    }

    /* Done flash */
    @keyframes flash {
      0%, 100% { color: #e2e8f0; }
      50% { color: #ef4444; }
    }

    .time-label.done {
      animation: flash 0.6s ease 4;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>タイマー</h1>

    <div class="ring-wrap">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle class="track" cx="90" cy="90" r="80" />
        <circle class="progress" id="ring" cx="90" cy="90" r="80"
          stroke-dasharray="502.65"
          stroke-dashoffset="0" />
      </svg>
      <div class="time-label" id="display">00:00</div>
    </div>

    <div class="inputs">
      <div>
        <input type="number" id="minInput" value="5" min="0" max="99" />
        <label>分</label>
      </div>
      <div class="sep">:</div>
      <div>
        <input type="number" id="secInput" value="0" min="0" max="59" />
        <label>秒</label>
      </div>
    </div>

    <div class="buttons">
      <button id="mainBtn">スタート</button>
      <button id="resetBtn">リセット</button>
    </div>
  </div>

  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 80; // 502.65

    const display = document.getElementById('display');
    const ring = document.getElementById('ring');
    const mainBtn = document.getElementById('mainBtn');
    const resetBtn = document.getElementById('resetBtn');
    const minInput = document.getElementById('minInput');
    const secInput = document.getElementById('secInput');

    let total = 0;
    let remaining = 0;
    let intervalId = null;
    let running = false;

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function render(sec) {
      display.textContent = `${pad(Math.floor(sec / 60))}:${pad(sec % 60)}`;
      const pct = total > 0 ? sec / total : 1;
      ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
      ring.classList.toggle('urgent', sec <= 10 && sec > 0);
    }

    function getInput() {
      const m = Math.max(0, parseInt(minInput.value) || 0);
      const s = Math.max(0, Math.min(59, parseInt(secInput.value) || 0));
      return m * 60 + s;
    }

    function setInputsDisabled(disabled) {
      minInput.disabled = disabled;
      secInput.disabled = disabled;
    }

    function start() {
      if (running) {
        // 一時停止
        clearInterval(intervalId);
        intervalId = null;
        running = false;
        mainBtn.textContent = '再開';
        mainBtn.classList.add('pause');
        return;
      }

      // 新規 or 再開
      if (remaining === 0) {
        total = getInput();
        if (total === 0) return;
        remaining = total;
      }

      running = true;
      mainBtn.textContent = '一時停止';
      mainBtn.classList.add('pause');
      setInputsDisabled(true);
      render(remaining);

      intervalId = setInterval(() => {
        remaining--;
        render(remaining);

        if (remaining <= 0) {
          clearInterval(intervalId);
          intervalId = null;
          running = false;
          mainBtn.textContent = 'スタート';
          mainBtn.classList.remove('pause');
          setInputsDisabled(false);
          display.classList.add('done');
          display.addEventListener('animationend', () => display.classList.remove('done'), { once: true });
        }
      }, 1000);
    }

    function reset() {
      clearInterval(intervalId);
      intervalId = null;
      running = false;
      remaining = 0;
      total = 0;
      mainBtn.textContent = 'スタート';
      mainBtn.classList.remove('pause');
      setInputsDisabled(false);
      render(getInput());
    }

    mainBtn.addEventListener('click', start);
    resetBtn.addEventListener('click', reset);

    [minInput, secInput].forEach(el => {
      el.addEventListener('input', () => {
        if (!running && remaining === 0) render(getInput());
      });
    });

    render(getInput());
  </script>
</body>
</html>
